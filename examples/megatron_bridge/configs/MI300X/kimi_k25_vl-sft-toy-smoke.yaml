work_group: ${PRIMUS_TEAM:amd}
user_name: ${PRIMUS_USER:root}
exp_name: ${PRIMUS_EXP_NAME:kimi_k25_vl_sft_toy_smoke_mi300x}
workspace: ${PRIMUS_WORKSPACE:./output}

modules:
  post_trainer:
    framework: megatron_bridge
    config: sft_trainer.yaml

    model: kimi_k25_vl.yaml

    overrides:
      stderr_sink_level: DEBUG

      # ===== Recipe function parameters (passed via auto_filter_and_call) =====
      # hf_path: passed to kimi_k25_vl_sft_config(hf_path=...) to use toy model
      hf_path: ${DATA_PATH:./data}/kimi_k25_vl_toy

      # ===== Checkpoint Loading =====
      # null = random init; also kept top-level so 01_convert_checkpoints.sh hook can read it
      pretrained_checkpoint: null

      # ===== Model sub-config (cfg.model.*) =====
      model:
        # Parallelism: minimal for 4-GPU smoke test (recipe defaults: TP=2, PP=16, EP=32)
        tensor_model_parallel_size: 1
        pipeline_model_parallel_size: 1
        virtual_pipeline_model_parallel_size: null
        pipeline_model_parallel_layout: null
        context_parallel_size: 1
        sequence_parallel: false
        expert_model_parallel_size: 1
        expert_tensor_parallel_size: 1

        # MoE Dispatcher: EP=1 requires allgather, not alltoall/deepep
        moe_token_dispatcher_type: allgather
        moe_flex_dispatcher_backend: allgather
        moe_enable_deepep: false
        # shared expert overlap requires alltoall; disable for EP=1 allgather
        moe_shared_expert_overlap: false

        # Recompute
        recompute_granularity: full
        recompute_method: uniform
        recompute_num_layers: 1

        # Disable CUDA graph for smoke test
        # cuda_graph_scope must be null (not "") to avoid KeyError in CudaGraphScope enum
        cuda_graph_impl: "none"
        cuda_graph_scope: null
        cuda_graph_warmup_steps: 0

      # ===== Training sub-config (cfg.train.*) =====
      train:
        train_iters: 5
        global_batch_size: 4
        micro_batch_size: 1
        manual_gc: true
        manual_gc_interval: 5

      # ===== Checkpoint sub-config (cfg.checkpoint.*) =====
      checkpoint:
        pretrained_checkpoint: null
        finetune: false
        save_interval: 10000

      # ===== Dataset sub-config (cfg.dataset.*) =====
      dataset:
        seq_length: 1024
        num_workers: 2
        pack_sequences_in_batch: false
        trust_remote_code: true

      # ===== Validation sub-config (cfg.validation.*) =====
      validation:
        eval_iters: 0
        eval_interval: 10000

      # ===== Scheduler sub-config (cfg.scheduler.*) =====
      scheduler:
        lr_warmup_iters: 0
        lr_decay_iters: 5
