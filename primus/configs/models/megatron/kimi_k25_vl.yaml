extends:
- deepseek_v3_base.yaml

# Kimi-K2.5-VL: 1T total params, 384 MoE experts, VLM variant
# Reference: https://huggingface.co/moonshotai/Kimi-K2.5
# Recipe: third_party/Megatron-Bridge/src/megatron/bridge/recipes/kimi_vl/kimi_k25_vl.py

tokenizer_type: DeepSeekV3Tokenizer
tokenizer_model: moonshotai/Kimi-K2.5

# Model architecture (same as Kimi-K2 base)
num_layers: 61
hidden_size: 7168
ffn_hidden_size: 18432
num_attention_heads: 64

# Multi-Latent Attention (MLA)
q_lora_rank: 1536
kv_lora_rank: 512
qk_head_dim: 128
qk_pos_emb_head_dim: 64
v_head_dim: 128
kv_channels: 128

# Multi-token Prediction (MTP)
mtp_num_layers: 1
mtp_loss_scaling_factor: 0.1

# MoE Configuration (384 experts)
moe_layer_freq: "([0]*3+[1]*58)"
num_experts: 384
moe_router_topk: 8
moe_ffn_hidden_size: 2048
moe_shared_expert_intermediate_size: 2048

# Device-limited routing for multi-node training
expert_model_parallel_size: 32 # Will be overridden in experiment configs
moe_router_num_groups: 8
moe_router_group_topk: 4
moe_router_topk_scaling_factor: 2.5

# MoE Token Dispatcher (alltoall for multi-GPU)
moe_token_dispatcher_type: alltoall
moe_flex_dispatcher_backend: deepep
moe_hybridep_num_sms: 16

# Kernel optimizations for VLM
moe_permute_fusion: true
moe_grouped_gemm: true
cross_entropy_loss_fusion: true
cross_entropy_fusion_impl: te

# Transformer Engine for efficiency
transformer_impl: transformer_engine

# Attention backend
attention_backend: null

# Pipeline layout (asymmetric stages for PP=16)
# Embedding + 13 decoder layers -> 13 decoder -> 13 decoder -> 5 decoder + loss
# This is dynamically set in training recipe for different PP sizes
pipeline_model_parallel_layout: null
account_for_embedding_in_pipeline_split: false
account_for_loss_in_pipeline_split: false

# Recompute settings for memory efficiency
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1

# Communication and overlap
moe_shared_expert_overlap: true
moe_router_fusion: false
moe_router_padding_for_fp8: false

# Context and sequence parallel (to be overridden per experiment)
context_parallel_size: 1
sequence_parallel: true
virtual_pipeline_model_parallel_size: null

# Checkpointing and save config
checkpoint_format: torch

# Rotary embeddings (inherited from deepseek_v3_base)
# rotary_base: 10000
# rotary_scaling_factor: 40.0
# original_max_position_embeddings: 4096
# mscale: 1.0
# mscale_all_dim: 1.0
