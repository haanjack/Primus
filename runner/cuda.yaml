# Primus CLI NVIDIA GPU Configuration
# Use this config for running Primus on NVIDIA GPUs (e.g., 2x RTX 3090).
#
# Usage:
#   docker build -t primus-cuda:latest -f docker/Dockerfile.cuda .
#   GPUS_PER_NODE=2 ./primus-cli --config runner/cuda.yaml container \
#     -- train pretrain --config examples/megatron/configs/cuda/llama3.2_1B-BF16-pretrain.yaml
#
# Note: MaxText/JAX requires a separate JAX+CUDA container image (not covered here).

container:
  options:
    image: "primus-cuda:latest"

    ipc: "host"
    network: "host"
    name: "primus-training-cuda"

    # NVIDIA GPU access via --gpus (replaces ROCm --device flags)
    gpus: "all"
    device: []

    cap-add:
      - "SYS_PTRACE"

    env:
      - "MASTER_ADDR"
      - "MASTER_PORT"
      - "NNODES"
      - "NODE_RANK"
      - "GPUS_PER_NODE"
      - "WANDB_API_KEY"
      - "HF_TOKEN"
      - "NCCL_IB_HCA"
      - "NCCL_SOCKET_IFNAME"
      - "GLOO_SOCKET_IFNAME"

direct:
  gpus_per_node: 2
  master_port: 1234
  nnodes: 1
  master_addr: "localhost"
  run_mode: "torchrun"
  script: "primus/cli/main.py"
  numa: "false"
  env:
    - "GPUS_PER_NODE=2"
    - "MASTER_ADDR=localhost"
    - "NCCL_SOCKET_IFNAME=lo"
    - "GLOO_SOCKET_IFNAME=lo"
    - "PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True"
